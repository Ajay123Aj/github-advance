name: Rollback Deployment

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Enter commit SHA to rollback"
        required: true

jobs:
  rollback:
    runs-on: ubuntu-latest

    steps:
      - name: Rollback on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_EC2_HOST }}
          username: ${{ secrets.PROD_EC2_USER }}
          key: ${{ secrets.PROD_EC2_SSH_KEY }}
          script: |
            docker pull your-dockerhub-username/my-app:${{ github.event.inputs.image_tag }}
            docker stop my-app || true
            docker rm my-app || true
            docker run -d -p 5000:5000 --name my-app your-dockerhub-username/my-app:${{ github.event.inputs.image_tag }}
